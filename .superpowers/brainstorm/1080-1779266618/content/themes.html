<h2>四种主题风格</h2>
<p class="subtitle">在设置中随时切换，点击选择你最喜欢的默认主题</p>

          <div style="font-size: 12px; font-weight: 600; color: white; margin-bottom: 10px;">毛玻璃主题</div>
          <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 6px;">
            <div style="width: 12px; height: 12px; border: 1.5px solid rgba(255,255,255,0.7); border-radius: 50%;"></div>
            <span style="font-size: 11px; color: rgba(255,255,255,0.9);">完成方案设计</span>

            <div style="width: 12px; height: 12px; border: 1.5px solid rgba(255,255,255,0.7); border-radius: 50%;"></div>
            <span style="font-size: 11px; color: rgba(255,255,255,0.9);">回复邮件</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>毛玻璃 / 亚克力</h3>
      <p>半透明模糊背景，柔和阴影，现代感十足</p>
    </div>
  </div>
